<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IASE Legal Documents</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 { color: #1a1a1a; text-align: center; }
        .logo { text-align: center; font-size: 60px; margin-bottom: 20px; }
        .brand { text-align: center; color: #667eea; font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        .doc-list { list-style: none; padding: 0; }
        .doc-item {
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            transition: transform 0.2s;
        }
        .doc-item:hover { transform: translateX(10px); }
        .doc-item a {
            color: #667eea;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
        }
        .doc-item a:hover { text-decoration: underline; }
        .doc-item p { color: #666; margin: 10px 0 0 0; font-size: 14px; }
        .footer { text-align: center; margin-top: 40px; color: #999; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏄</div>
        <div class="brand">IASE</div>
        <p class="subtitle">International Association of Surfing Education</p>
        
        <h1>Legal Documents</h1>
        
        <ul class="doc-list">
            <li class="doc-item">
                <a href="./privacy-policy.html">📄 Privacy Policy</a>
                <p>How we collect, use, and protect your personal information</p>
            </li>
            <li class="doc-item">
                <a href="./terms-of-service.html">📋 Terms of Service</a>
                <p>Rules and guidelines for using our services</p>
            </li>
        </ul>
        
        <div class="footer">
            © 2026 IASE. All rights reserved.
        </div>
    </div>
</body>
</html>
